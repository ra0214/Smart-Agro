<div class="login-page">
  <div class="login-card">
    <h2>Iniciar sesión</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <label for="username">Usuario</label>
      <input id="username" formControlName="username" type="text" placeholder="Ingresa tu usuario" [disabled]="loading" />
      <div class="error" *ngIf="submitted && f['username'].invalid">Usuario requerido (mínimo 3 caracteres)</div>

      <label for="password">Contraseña</label>
      <input id="password" formControlName="password" type="password" placeholder="Ingresa tu contraseña" [disabled]="loading" />
      <div class="error" *ngIf="submitted && f['password'].invalid">Contraseña requerida (mínimo 4 caracteres)</div>

      <div class="error" *ngIf="error">{{ error }}</div>

      <button type="submit" [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading">Autenticando...</span>
      </button>
    </form>
  </div>

  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
  </div>
</div>
