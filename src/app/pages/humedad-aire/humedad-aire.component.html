<app-header></app-header>

<main class="humedad-aire-main">
  <section class="humedad-aire-content" *ngIf="!loading && report; else loadingState">

    <header class="page-header">
      <h1 class="page-title">Humedad del aire</h1>
      <p class="page-subtitle">Humedad relativa y punto de rocío · Actualización cada 8 s</p>
    </header>

    <p class="section-title">Resumen actual</p>

    <app-punto-rocio-resumen
      [relativeHumidity]="report.currentRelativeHumidity"
      [dewPoint]="report.currentDewPoint"
    ></app-punto-rocio-resumen>

    <p class="section-title" style="margin-top: 1.25rem;">Humedad relativa del aire y punto de rocío</p>

    <app-humedad-relativa-chart
      [relativeHumiditySeries]="report.relativeHumiditySeries"
      [dewPointSeries]="report.dewPointSeries"
      [labels]="report.labels"
    ></app-humedad-relativa-chart>

    <p class="avg-note">Promedio de humedad relativa: <strong>{{ promedioHumedad | number:'1.0-0' }}%</strong></p>

  </section>

  <ng-template #loadingState>
    <section class="humedad-aire-content">
      <header class="page-header">
        <h1 class="page-title">Humedad del aire</h1>
      </header>
      <div class="loading loading-spinner">Cargando datos...</div>
    </section>
  </ng-template>
</main>
